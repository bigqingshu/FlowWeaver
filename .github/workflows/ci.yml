name: CI

on:
  push:
  pull_request:

jobs:
  windows-python312:
    runs-on: windows-latest
    env:
      FLOWWEAVER_EMBEDDED_PYTHON_VERSION: "3.12.10"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare repo-local Python 3.12
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pythonVersion = $env:FLOWWEAVER_EMBEDDED_PYTHON_VERSION
          $zipName = "python-$pythonVersion-embed-amd64.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName
          $downloadUrl = "https://www.python.org/ftp/python/$pythonVersion/$zipName"

          Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath
          New-Item -ItemType Directory -Path "python312" -Force | Out-Null
          Expand-Archive -LiteralPath $zipPath -DestinationPath "python312" -Force

          $pthPath = Join-Path "python312" "python312._pth"
          $pthContent = Get-Content -Path $pthPath -Raw
          $pthContent = $pthContent -replace "(?m)^#import site$", "import site"
          Set-Content -Path $pthPath -Value $pthContent -Encoding ascii

          $getPipPath = Join-Path $env:RUNNER_TEMP "get-pip.py"
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile $getPipPath
          .\python312\python.exe $getPipPath
          .\python312\python.exe -m pip install --disable-pip-version-check --no-warn-script-location .
          .\python312\python.exe -m uvicorn --version

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src tests migrations

      - name: Mypy
        run: uv run mypy

      - name: Tests
        run: uv run pytest
